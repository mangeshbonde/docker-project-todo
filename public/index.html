<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📝 To-Do App (MySQL + Docker)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 35px;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    h1 { color: #e2e8f0; font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 28px; }
    .db-badge {
      display: inline-block;
      background: #22c55e22;
      color: #4ade80;
      border: 1px solid #4ade8044;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      margin-left: 8px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: #64748b; }
    input[type="text"]:focus { border-color: #6366f1; }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-add {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      white-space: nowrap;
    }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 5px 15px #6366f155; }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-btn {
      padding: 6px 16px;
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      border-radius: 20px;
    }
    .filter-btn.active {
      background: #6366f122;
      color: #818cf8;
      border-color: #6366f155;
    }
    .stats {
      color: #64748b;
      font-size: 0.8rem;
      margin-bottom: 16px;
    }
    .stats span { color: #94a3b8; font-weight: 600; }
    ul { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      margin-bottom: 10px;
      transition: all 0.2s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item:hover { background: rgba(255,255,255,0.07); }
    .todo-item.done { opacity: 0.5; }
    .todo-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #475569;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: transparent;
      padding: 0;
    }
    .todo-check.checked { background: #22c55e; border-color: #22c55e; }
    .todo-check.checked::after { content: '✓'; color: white; font-size: 13px; }
    .todo-text {
      flex: 1;
      color: #e2e8f0;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #475569;
    }
    .todo-date { color: #475569; font-size: 0.72rem; }
    .btn-delete {
      background: transparent;
      color: #475569;
      padding: 4px 8px;
      font-size: 1rem;
      border-radius: 6px;
    }
    .btn-delete:hover { color: #f87171; background: rgba(248,113,113,0.1); }
    .empty { text-align: center; color: #475569; padding: 30px 0; font-size: 0.9rem; }
    .loading { text-align: center; color: #64748b; padding: 20px; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #1e293b; color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 20px; border-radius: 10px;
      font-size: 0.85rem; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 To-Do List <span class="db-badge">🐬 MySQL</span></h1>
  <p class="subtitle">Data persisted in MySQL via Docker</p>

  <div class="input-row">
    <input type="text" id="input" placeholder="Add a new task..." />
    <button class="btn-add" onclick="addTodo()">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>

  <div class="stats" id="stats"></div>
  <ul id="list"><div class="loading">Loading from MySQL...</div></ul>
</div>
<div class="toast" id="toast"></div>

<script>
  let todos = [], filter = 'all';

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch('/api' + path, opts);
    return r.json();
  }

  async function load() {
    todos = await api('GET', '/todos');
    render();
  }

  async function addTodo() {
    const input = document.getElementById('input');
    const title = input.value.trim();
    if (!title) return;
    const todo = await api('POST', '/todos', { title });
    todos.unshift(todo);
    input.value = '';
    render();
    toast('✅ Task added to MySQL');
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    const updated = await api('PUT', `/todos/${id}`, { completed: !todo.completed });
    todos = todos.map(t => t.id === id ? updated : t);
    render();
  }

  async function deleteTodo(id) {
    await api('DELETE', `/todos/${id}`);
    todos = todos.filter(t => t.id !== id);
    render();
    toast('🗑️ Task deleted');
  }

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.completed;
      if (filter === 'done') return t.completed;
      return true;
    });
    const done = todos.filter(t => t.completed).length;
    document.getElementById('stats').innerHTML =
      `<span>${todos.length}</span> total · <span>${done}</span> done · <span>${todos.length - done}</span> remaining`;

    const ul = document.getElementById('list');
    if (!filtered.length) {
      ul.innerHTML = `<div class="empty">No tasks here! ${filter === 'all' ? 'Add one above ☝️' : ''}</div>`;
      return;
    }
    ul.innerHTML = filtered.map(t => `
      <li class="todo-item ${t.completed ? 'done' : ''}">
        <button class="todo-check ${t.completed ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></button>
        <span class="todo-text">${escHtml(t.title)}</span>
        <span class="todo-date">${new Date(t.created_at).toLocaleDateString()}</span>
        <button class="btn-delete" onclick="deleteTodo(${t.id})">🗑</button>
      </li>`).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  load();
</script>
</body>
</html>
